<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Cinéma – Réservation</title>
  <link rel="stylesheet" href="css/style.css" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid d-flex justify-content-between">
      <span class="navbar-brand mb-0 h1">🎬 Cinéma – Réservation</span>

      <div class="d-flex align-items-center">
        <span id="reservations-btn"
              class="text-light me-3 d-none"
              style="cursor:pointer;">
          🎟️ Mes réservations
        </span>
        <span id="user-info" class="text-light"></span>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="row">
      <!-- CONNEXION -->
      <div class="col-md-4">
        <h3>Connexion</h3>
        <form id="login-form">
          <div class="mb-3">
            <label class="form-label">Nom d'utilisateur</label>
            <input type="text" class="form-control" id="login-username" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Mot de passe</label>
            <input type="password" class="form-control" id="login-password" required />
          </div>
          <button type="submit" class="btn btn-primary w-100">Se connecter</button>
          <div id="login-message" class="mt-2"></div>
        </form>

        <button id="logout-btn" class="btn btn-secondary w-100 mt-3 d-none">
          Se déconnecter
        </button>
      </div>

      <!-- FILMS À L'AFFICHE -->
      <div class="col-md-8">
        <h3>Films à l'affiche</h3>
        <div id="movies-container" class="row g-3">
          <!-- Cartes de films injectées en JS -->
        </div>
      </div>
    </div>

    <hr class="my-4" />

    <!-- ADMIN : Ajouter un film -->
    <div id="admin-section" class="row d-none">
      <div class="col-md-6">
        <h3>Ajouter un film (Admin)</h3>
        <form id="add-movie-form">
          <div class="mb-3">
            <label class="form-label">Titre</label>
            <input type="text" class="form-control" id="movie-title" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="movie-description"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Classification (rating)</label>
            <input type="text" class="form-control" id="movie-rating" placeholder="PG-13, G, etc." />
          </div>
          <div class="mb-3">
            <label class="form-label">Durée (minutes)</label>
            <input type="number" class="form-control" id="movie-duration" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Date de sortie</label>
            <input type="date" class="form-control" id="movie-release-date" />
          </div>
          <button type="submit" class="btn btn-success w-100">
            Ajouter le film
          </button>
          <div id="add-movie-message" class="mt-2"></div>
        </form>
      </div>
    </div>

    <!-- ADMIN : Ajouter une séance -->
    <div id="showtime-section" class="row d-none mt-4">
      <div class="col-md-6">
        <h3>Ajouter une séance (Admin)</h3>
        <form id="add-showtime-form">
          <div class="mb-3">
            <label class="form-label">Film</label>
            <select class="form-control" id="showtime-movie"></select>
          </div>

          <div class="mb-3">
            <label class="form-label">Salle</label>
            <select class="form-control" id="showtime-room"></select>
          </div>

          <div class="mb-3">
            <label class="form-label">Date et heure</label>
            <input type="datetime-local" class="form-control" id="showtime-start" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Prix ($)</label>
            <input type="number" class="form-control" id="showtime-price" required>
          </div>

          <button type="submit" class="btn btn-success w-100">
            Créer la séance
          </button>
          <div id="add-showtime-message" class="mt-2"></div>
        </form>
      </div>
    </div>

    <!-- MES RÉSERVATIONS -->
    <div id="reservations-section" class="container d-none mt-4">
      <h3>Mes réservations</h3>
      <div id="reservations-list" class="row g-3"></div>
    </div>
  </div>

  <!-- JS -->
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/movies.js"></script>
  <script type="module" src="js/reservations.js"></script>
</body>
</html>
